name: Music Production Pipeline

# Triggers:
#   - Push to main that touches projects/ (normal production flow)
#   - Manual dispatch with optional song/variant overrides
on:
  push:
    branches: [main]
    paths: ["projects/**"]
  workflow_dispatch:
    inputs:
      song:
        description: "Song slug to force-process (blank = use git diff; 'all' = every song)"
        required: false
        default: ""
      variant:
        description: "Variant slug (blank = all variants of the song)"
        required: false
        default: ""

# Prevent concurrent deploys from colliding on songs.json
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Job 0: Detect changed (song, variant) pairs ───────────────────────────
  detect-diff:
    name: Detect changed variants
    runs-on: ubuntu-latest
    outputs:
      pairs: ${{ steps.diff.outputs.pairs }}
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed (song, variant) pairs
        id: diff
        env:
          FORCE_SONG: ${{ github.event.inputs.song }}
          FORCE_VARIANT: ${{ github.event.inputs.variant }}
        run: |
          build_pairs_all() {
            local p="[" first=true
            for sd in projects/*/; do
              local song; song=$(basename "$sd")
              for vd in "projects/$song/variants"/*/; do
                [[ -d "$vd" ]] || continue
                local v; v=$(basename "$vd")
                [[ "$first" == "true" ]] || p+=","
                p+="{\"song\":\"$song\",\"variant\":\"$v\"}"
                first=false
              done
            done
            echo "${p}]"
          }
          build_pairs_song() {
            local song="$1" p="[" first=true
            for vd in "projects/$song/variants"/*/; do
              [[ -d "$vd" ]] || continue
              local v; v=$(basename "$vd")
              [[ "$first" == "true" ]] || p+=","
              p+="{\"song\":\"$song\",\"variant\":\"$v\"}"
              first=false
            done
            echo "${p}]"
          }
          if [[ "$FORCE_SONG" == "all" ]]; then
            pairs=$(build_pairs_all)
          elif [[ -n "$FORCE_SONG" && -n "$FORCE_VARIANT" ]]; then
            pairs="[{\"song\":\"$FORCE_SONG\",\"variant\":\"$FORCE_VARIANT\"}]"
          elif [[ -n "$FORCE_SONG" ]]; then
            pairs=$(build_pairs_song "$FORCE_SONG")
          else
            pairs=$(bash scripts/00_detect_diff.sh)
          fi
          echo "pairs=$pairs" >> "$GITHUB_OUTPUT"
          if [[ "$pairs" == "[]" ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changed variants detected — skipping pipeline."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changed pairs: $pairs"
          fi

  # ── Job 1: Per-variant pipeline (matrix) ─────────────────────────────────
  pipeline:
    name: "Pipeline: ${{ matrix.song }}/${{ matrix.variant }}"
    needs: detect-diff
    if: needs.detect-diff.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-diff.outputs.pairs) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fluidsynth fonts-noto-cjk
          # aws CLI v2 is pre-installed on ubuntu-latest; no apt install needed

      - name: Install Python dependencies
        run: pip install --quiet boto3 requests music21

      # ── Step 1: Fetch models from R2 (no GHA cache — licensing constraint) ──
      - name: Fetch NEUTRINO models and SoundFont from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          SINGER: ${{ secrets.NEUTRINO_SINGER }}
        run: bash scripts/01_fetch_models.sh

      # ── Step 1.5: SSoT conversion (runs only when full.musicxml is present) ──
      - name: Convert SSoT MusicXML into vocal + backing parts
        run: |
          if [ -f "projects/${{ matrix.song }}/full.musicxml" ]; then
            python3 scripts/00_convert_ssot.py --song "${{ matrix.song }}"
          else
            echo "[convert-ssot] No full.musicxml for ${{ matrix.song }} — skipping"
          fi

      # ── Step 2: Synthesis ──────────────────────────────────────────────────
      - name: Synthesize vocal and accompaniment
        env:
          SONG_DIR: projects/${{ matrix.song }}
          VARIANT_DIR: projects/${{ matrix.song }}/variants/${{ matrix.variant }}
          SINGER: ${{ secrets.NEUTRINO_SINGER }}
          NEUTRINO_DIR: /tmp/neutrino
          sf3_PATH: /tmp/default.sf3
        run: bash scripts/02_synthesize.sh

      # ── Step 3: Mix ────────────────────────────────────────────────────────
      - name: Mix vocal + accompaniment
        run: >
          python3 scripts/03_mixdown.py
          projects/${{ matrix.song }}/variants/${{ matrix.variant }}

      # ── Persist audio (7-day retention) ────────────────────────────────────
      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-${{ matrix.song }}-${{ matrix.variant }}
          path: |
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/output/audio.wav
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/output/audio.mp3
          retention-days: 7

      # ── Step 4: Generate video (not persisted) ─────────────────────────────
      - name: Generate video
        run: >
          python3 scripts/04_generate_video.py
          projects/${{ matrix.song }}
          projects/${{ matrix.song }}/variants/${{ matrix.variant }}

      # ── Step 5: YouTube upload via GAS relay ───────────────────────────────
      # continue-on-error: quota exhaustion must not block Pages deployment.
      # 05_trigger_gas.py writes meta.json even on failure (without youtube_id)
      # so the meta artifact is always available for deploy-web and update-queue.
      - name: Upload to YouTube via GAS relay
        id: upload-youtube
        continue-on-error: true
        env:
          GAS_RELAY_URL: ${{ secrets.GAS_RELAY_URL }}
          GAS_API_KEY: ${{ secrets.GAS_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          GITHUB_SHA: ${{ github.sha }}
        run: >
          python3 scripts/05_trigger_gas.py
          projects/${{ matrix.song }}
          projects/${{ matrix.song }}/variants/${{ matrix.variant }}

      # ── Persist outputs (video ID + audio + updated variant.json) ──────────
      # if: always() — upload meta even when YouTube failed so update-queue and
      # deploy-web can process partial results without waiting for all uploads.
      - name: Upload meta artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-${{ matrix.song }}-${{ matrix.variant }}
          path: |
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/output/meta.json
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/output/audio.mp3
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/variant.json
          retention-days: 30

  # ── Job 2: Update YouTube upload queue ───────────────────────────────────
  # Runs after the matrix regardless of success/failure.  Reads all meta
  # artifacts, removes successfully uploaded variants, enqueues failures for
  # the daily youtube-retry workflow, and commits youtube-queue.json.
  update-queue:
    name: Update YouTube upload queue
    needs: pipeline
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download all meta artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: meta-*
          path: artifacts/meta
          merge-multiple: false

      - name: Update queue
        run: >
          python3 scripts/youtube_queue.py update
          --meta-dir artifacts/meta
          --sha ${{ github.sha }}

      - name: Commit queue changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youtube-queue.json
          git diff --cached --quiet && echo "Queue unchanged." || (
            git commit -m "chore: update youtube upload queue [skip ci]" &&
            git push origin HEAD:main
          )

  # ── Job 3: Web deploy ─────────────────────────────────────────────────────
  # Runs after both pipeline and update-queue, even if some matrix jobs failed.
  # Pages is deployed with whatever audio/youtube_id data is available.
  deploy-web:
    name: Deploy website
    needs: [pipeline, update-queue]
    if: always()
    runs-on: ubuntu-latest
    # Serialise concurrent deploys; never cancel an in-flight deploy
    concurrency:
      group: deploy-web
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9.15.9 --activate

      - name: Download all meta artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: meta-*
          path: artifacts/meta
          merge-multiple: false

      - name: Merge songs.json and copy public assets
        run: python3 scripts/06_merge_songs.py

      - name: Commit youtube_id back to variant.json files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/*/variants/*/variant.json
          git diff --cached --quiet && echo "No youtube_id changes." || (
            git commit -m "chore: persist youtube_id for processed variants [skip ci]" &&
            git push origin HEAD:main
          )

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}/
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
