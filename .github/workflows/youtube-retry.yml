name: YouTube Upload Retry

# Runs daily at 01:00 UTC to retry variants that hit the quota limit on the
# previous push.  Also triggerable manually for ad-hoc retries.
#
# Queue file: youtube-queue.json (committed to main, managed by
# scripts/youtube_queue.py).  Each entry: {song, variant, sha, queued_at}.
# Per (song, variant) the most recently queued entry wins; older entries for
# the same pair are discarded.  Up to 5 items are processed per run to stay
# within the YouTube Data API daily quota.

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: youtube-retry
  cancel-in-progress: false

jobs:
  # ── Job 0: Read queue and produce matrix input ────────────────────────────
  read-queue:
    name: Read upload queue
    runs-on: ubuntu-latest
    outputs:
      pairs: ${{ steps.read.outputs.pairs }}
      has_items: ${{ steps.read.outputs.has_items }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Read pending items (max 5)
        id: read
        run: python3 scripts/youtube_queue.py read --max 5 >> "$GITHUB_OUTPUT"

  # ── Job 1: Per-variant pipeline (matrix) ─────────────────────────────────
  pipeline:
    name: "Retry: ${{ matrix.song }}/${{ matrix.variant }}"
    needs: read-queue
    if: needs.read-queue.outputs.has_items == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.read-queue.outputs.pairs) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fluidsynth fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install --quiet boto3 requests music21

      - name: Fetch NEUTRINO models and SoundFont from R2
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          SINGER: ${{ secrets.NEUTRINO_SINGER }}
        run: bash scripts/01_fetch_models.sh

      - name: Convert SSoT MusicXML
        run: |
          if [ -f "projects/${{ matrix.song }}/full.musicxml" ]; then
            python3 scripts/00_convert_ssot.py --song "${{ matrix.song }}"
          fi

      - name: Synthesize vocal and accompaniment
        env:
          SONG_DIR: projects/${{ matrix.song }}
          VARIANT_DIR: projects/${{ matrix.song }}/variants/${{ matrix.variant }}
          SINGER: ${{ secrets.NEUTRINO_SINGER }}
          NEUTRINO_DIR: /tmp/neutrino
          sf3_PATH: /tmp/default.sf3
        run: bash scripts/02_synthesize.sh

      - name: Mix vocal + accompaniment
        run: >
          python3 scripts/03_mixdown.py
          projects/${{ matrix.song }}/variants/${{ matrix.variant }}

      - name: Generate video
        run: >
          python3 scripts/04_generate_video.py
          projects/${{ matrix.song }}
          projects/${{ matrix.song }}/variants/${{ matrix.variant }}

      - name: Upload to YouTube via GAS relay
        id: upload-youtube
        continue-on-error: true
        env:
          GAS_RELAY_URL: ${{ secrets.GAS_RELAY_URL }}
          GAS_API_KEY: ${{ secrets.GAS_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          GITHUB_SHA: ${{ github.sha }}
        run: >
          python3 scripts/05_trigger_gas.py
          projects/${{ matrix.song }}
          projects/${{ matrix.song }}/variants/${{ matrix.variant }}

      - name: Upload meta artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: meta-${{ matrix.song }}-${{ matrix.variant }}
          path: |
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/output/meta.json
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/output/audio.mp3
            projects/${{ matrix.song }}/variants/${{ matrix.variant }}/variant.json
          retention-days: 30

  # ── Job 2: Update queue ───────────────────────────────────────────────────
  update-queue:
    name: Update YouTube upload queue
    needs: pipeline
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Download all meta artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: meta-*
          path: artifacts/meta
          merge-multiple: false

      - name: Update queue
        run: >
          python3 scripts/youtube_queue.py update
          --meta-dir artifacts/meta
          --sha ${{ github.sha }}

      - name: Commit queue changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add youtube-queue.json
          git diff --cached --quiet && echo "Queue unchanged." || (
            git commit -m "chore: update youtube upload queue [skip ci]" &&
            git push origin HEAD:main
          )

  # ── Job 3: Deploy Pages ───────────────────────────────────────────────────
  deploy-web:
    name: Deploy website
    needs: [pipeline, update-queue]
    if: always() && needs.pipeline.result != 'skipped'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-web
      cancel-in-progress: false
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm via corepack
        run: corepack enable && corepack prepare pnpm@9.15.9 --activate

      - name: Download all meta artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: meta-*
          path: artifacts/meta
          merge-multiple: false

      - name: Merge songs.json and copy public assets
        run: python3 scripts/06_merge_songs.py

      - name: Commit youtube_id back to variant.json files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/*/variants/*/variant.json
          git diff --cached --quiet && echo "No youtube_id changes." || (
            git commit -m "chore: persist youtube_id for updated variants [skip ci]" &&
            git push origin HEAD:main
          )

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_BASE_URL: ${{ steps.pages.outputs.base_path }}/
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
